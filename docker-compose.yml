services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  gateway:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ADMIN_TOKEN=${ADMIN_TOKEN:?set ADMIN_TOKEN}
      - REDIS_URL=redis://redis:6379
      - RATE_LIMIT_WINDOW_SECS=${RATE_LIMIT_WINDOW_SECS:-60}
      - PRESIGN_EXPIRY_SECS=${PRESIGN_EXPIRY_SECS:-900}
    depends_on:
      - redis

volumes:
  redis-data:
